# Cache-Pot command surface: the single source of truth for every command,
# not just what's implemented today.
#
# Fields:
#   name:    the RESP command name as a client would send it
#   category: functional grouping
#   version:  the Cache-Pot version that introduced this command (v0.1.0-v0.7.0)
#   status:  "real" (implemented) or "planned" (designed, not implemented)
#   summary: one-line description

# --- v0.1.0: Redis-compatible core (status: real) ---------------------

- name: PING
  category: connection
  version: "0.1.0"
  status: real
  summary: Check server liveness / measure round-trip latency
- name: ECHO
  category: connection
  version: "0.1.0"
  status: real
  summary: Echo back the given argument
- name: SELECT
  category: connection
  version: "0.1.0"
  status: real
  summary: Select a logical database (only accepts db 0)
- name: HELLO
  category: connection
  version: "0.1.0"
  status: real
  summary: Protocol handshake (RESP2 only; RESP3 rejected cleanly)
- name: AUTH
  category: connection
  version: "0.1.0"
  status: real
  summary: Authenticate the connection against the configured password
- name: CLIENT
  category: connection
  version: "0.1.0"
  status: real
  summary: Client introspection/control (GETNAME/SETNAME)
- name: COMMAND
  category: connection
  version: "0.1.0"
  status: real
  summary: Minimal command-table introspection
- name: INFO
  category: connection
  version: "0.1.0"
  status: real
  summary: Minimal server info/stats sections
- name: QUIT
  category: connection
  version: "0.1.0"
  status: real
  summary: Close the connection

- name: DEL
  category: generic
  version: "0.1.0"
  status: real
  summary: Delete one or more keys
- name: EXISTS
  category: generic
  version: "0.1.0"
  status: real
  summary: Count how many of the given keys exist
- name: EXPIRE
  category: generic
  version: "0.1.0"
  status: real
  summary: Set a key's time-to-live in seconds
- name: PEXPIRE
  category: generic
  version: "0.1.0"
  status: real
  summary: Set a key's time-to-live in milliseconds
- name: TTL
  category: generic
  version: "0.1.0"
  status: real
  summary: Get a key's remaining time-to-live in seconds
- name: PTTL
  category: generic
  version: "0.1.0"
  status: real
  summary: Get a key's remaining time-to-live in milliseconds
- name: PERSIST
  category: generic
  version: "0.1.0"
  status: real
  summary: Remove a key's expiry, making it persistent
- name: TYPE
  category: generic
  version: "0.1.0"
  status: real
  summary: Get the data type stored at a key
- name: KEYS
  category: generic
  version: "0.1.0"
  status: real
  summary: Find all keys matching a glob pattern
- name: SCAN
  category: generic
  version: "0.1.0"
  status: real
  summary: Cursor-based incremental iteration over the keyspace
- name: RENAME
  category: generic
  version: "0.1.0"
  status: real
  summary: Rename a key
- name: FLUSHDB
  category: generic
  version: "0.1.0"
  status: real
  summary: Remove all keys from the current workspace
- name: FLUSHALL
  category: generic
  version: "0.1.0"
  status: real
  summary: Remove all keys from the caller's own workspace (same scope as FLUSHDB; there is no cross-workspace flush)

- name: GET
  category: strings
  version: "0.1.0"
  status: real
  summary: Get the value of a key
- name: SET
  category: strings
  version: "0.1.0"
  status: real
  summary: Set the value of a key, with optional EX/PX/NX/XX/GET modifiers
- name: MGET
  category: strings
  version: "0.1.0"
  status: real
  summary: Get the values of multiple keys
- name: MSET
  category: strings
  version: "0.1.0"
  status: real
  summary: Set multiple key/value pairs atomically
- name: INCR
  category: strings
  version: "0.1.0"
  status: real
  summary: Increment an integer value by 1
- name: INCRBY
  category: strings
  version: "0.1.0"
  status: real
  summary: Increment an integer value by a given amount
- name: DECR
  category: strings
  version: "0.1.0"
  status: real
  summary: Decrement an integer value by 1
- name: DECRBY
  category: strings
  version: "0.1.0"
  status: real
  summary: Decrement an integer value by a given amount
- name: APPEND
  category: strings
  version: "0.1.0"
  status: real
  summary: Append a value to an existing string, creating it if absent
- name: STRLEN
  category: strings
  version: "0.1.0"
  status: real
  summary: Get the length of a string value

- name: HSET
  category: hash
  version: "0.1.0"
  status: real
  summary: Set one or more hash field/value pairs
- name: HGET
  category: hash
  version: "0.1.0"
  status: real
  summary: Get the value of a hash field
- name: HGETALL
  category: hash
  version: "0.1.0"
  status: real
  summary: Get all field/value pairs in a hash
- name: HDEL
  category: hash
  version: "0.1.0"
  status: real
  summary: Delete one or more hash fields
- name: HEXISTS
  category: hash
  version: "0.1.0"
  status: real
  summary: Check whether a hash field exists
- name: HKEYS
  category: hash
  version: "0.1.0"
  status: real
  summary: Get all field names in a hash
- name: HVALS
  category: hash
  version: "0.1.0"
  status: real
  summary: Get all values in a hash
- name: HLEN
  category: hash
  version: "0.1.0"
  status: real
  summary: Get the number of fields in a hash
- name: HMGET
  category: hash
  version: "0.1.0"
  status: real
  summary: Get the values of multiple hash fields
- name: HINCRBY
  category: hash
  version: "0.1.0"
  status: real
  summary: Increment an integer hash field by a given amount

- name: LPUSH
  category: list
  version: "0.1.0"
  status: real
  summary: Push one or more values onto the head of a list
- name: RPUSH
  category: list
  version: "0.1.0"
  status: real
  summary: Push one or more values onto the tail of a list
- name: LPOP
  category: list
  version: "0.1.0"
  status: real
  summary: Pop a value from the head of a list
- name: RPOP
  category: list
  version: "0.1.0"
  status: real
  summary: Pop a value from the tail of a list
- name: LRANGE
  category: list
  version: "0.1.0"
  status: real
  summary: Get a range of elements from a list
- name: LLEN
  category: list
  version: "0.1.0"
  status: real
  summary: Get the length of a list
- name: LINDEX
  category: list
  version: "0.1.0"
  status: real
  summary: Get an element from a list by index
- name: LSET
  category: list
  version: "0.1.0"
  status: real
  summary: Set the value of a list element by index
- name: LREM
  category: list
  version: "0.1.0"
  status: real
  summary: Remove matching elements from a list

- name: SADD
  category: set
  version: "0.1.0"
  status: real
  summary: Add one or more members to a set
- name: SREM
  category: set
  version: "0.1.0"
  status: real
  summary: Remove one or more members from a set
- name: SMEMBERS
  category: set
  version: "0.1.0"
  status: real
  summary: Get all members of a set
- name: SISMEMBER
  category: set
  version: "0.1.0"
  status: real
  summary: Check whether a value is a member of a set
- name: SCARD
  category: set
  version: "0.1.0"
  status: real
  summary: Get the number of members in a set
- name: SINTER
  category: set
  version: "0.1.0"
  status: real
  summary: Get the intersection of multiple sets
- name: SUNION
  category: set
  version: "0.1.0"
  status: real
  summary: Get the union of multiple sets
- name: SDIFF
  category: set
  version: "0.1.0"
  status: real
  summary: Get the difference of multiple sets

- name: ZADD
  category: sorted-set
  version: "0.1.0"
  status: real
  summary: Add one or more scored members to a sorted set
- name: ZREM
  category: sorted-set
  version: "0.1.0"
  status: real
  summary: Remove one or more members from a sorted set
- name: ZRANGE
  category: sorted-set
  version: "0.1.0"
  status: real
  summary: Get a range of members by rank, lowest score first
- name: ZREVRANGE
  category: sorted-set
  version: "0.1.0"
  status: real
  summary: Get a range of members by rank, highest score first
- name: ZSCORE
  category: sorted-set
  version: "0.1.0"
  status: real
  summary: Get the score of a member
- name: ZRANK
  category: sorted-set
  version: "0.1.0"
  status: real
  summary: Get the rank of a member, lowest score first
- name: ZCARD
  category: sorted-set
  version: "0.1.0"
  status: real
  summary: Get the number of members in a sorted set
- name: ZINCRBY
  category: sorted-set
  version: "0.1.0"
  status: real
  summary: Increment a member's score by a given amount
- name: ZRANGEBYSCORE
  category: sorted-set
  version: "0.1.0"
  status: real
  summary: Get members within a score range

- name: SUBSCRIBE
  category: pubsub
  version: "0.1.0"
  status: real
  summary: Subscribe to one or more channels
- name: UNSUBSCRIBE
  category: pubsub
  version: "0.1.0"
  status: real
  summary: Unsubscribe from one or more channels (or all, if none given)
- name: PUBLISH
  category: pubsub
  version: "0.1.0"
  status: real
  summary: Publish a message to a channel
- name: PSUBSCRIBE
  category: pubsub
  version: "0.1.0"
  status: real
  summary: Subscribe to channels matching a glob pattern
- name: PUNSUBSCRIBE
  category: pubsub
  version: "0.1.0"
  status: real
  summary: Unsubscribe from one or more patterns (or all, if none given)

- name: MULTI
  category: transactions
  version: "0.1.0"
  status: real
  summary: Begin queueing commands for atomic execution
- name: EXEC
  category: transactions
  version: "0.1.0"
  status: real
  summary: Execute all commands queued since MULTI
- name: DISCARD
  category: transactions
  version: "0.1.0"
  status: real
  summary: Discard all commands queued since MULTI
- name: WATCH
  category: transactions
  version: "0.1.0"
  status: real
  summary: Watch keys, aborting a subsequent EXEC if any changed
- name: UNWATCH
  category: transactions
  version: "0.1.0"
  status: real
  summary: Forget all watched keys

# --- v0.2.0: semantic cache, prompt cache, tool cache (status: real) ------

- name: CACHE.SEMANTIC
  category: semantic-cache
  version: "0.2.0"
  status: real
  summary: SET/GET an LLM response by embedding-similarity match, partitioned by model and temperature
- name: CACHE.PROMPT
  category: semantic-cache
  version: "0.2.0"
  status: real
  summary: SET/GET a response by an exact (template, variables, model) key
- name: TOOL.CACHE
  category: tool-cache
  version: "0.2.0"
  status: real
  summary: SET/GET a tool-call result by tool name and canonicalized arguments

# --- v0.3.0: vector search + MCP server (status: real) --------------------

- name: VECTOR.UPSERT
  category: vector
  version: "0.3.0"
  status: real
  summary: Insert or update a vector embedding (plus optional metadata/text) in a namespace
- name: VECTOR.SEARCH
  category: vector
  version: "0.3.0"
  status: real
  summary: Nearest-neighbor search over a namespace, with metric/filter/hybrid options
- name: VECTOR.DELETE
  category: vector
  version: "0.3.0"
  status: real
  summary: Delete a vector by id from a namespace

# --- v0.4.0: shared agent memory (status: real) ---------------------------

- name: MEMORY.PUT
  category: agent-memory
  version: "0.4.0"
  status: real
  summary: Store a memory item for an agent in a workspace, embedded for later semantic search
- name: MEMORY.GET
  category: agent-memory
  version: "0.4.0"
  status: real
  summary: Retrieve a memory item by id
- name: MEMORY.SEARCH
  category: agent-memory
  version: "0.4.0"
  status: real
  summary: Semantic search over a workspace's memories, across all agents unless AGENT-filtered
- name: AGENT.REMEMBER
  category: agent-memory
  version: "0.4.0"
  status: real
  summary: High-level helper to store an agent memory from raw content
- name: AGENT.RECALL
  category: agent-memory
  version: "0.4.0"
  status: real
  summary: High-level helper to recall only this agent's own memories relevant to a query

# --- v0.6.0: consolidation + knowledge graph (status: real) ---------------

- name: SUMMARY.CREATE
  category: consolidation
  version: "0.6.0"
  status: real
  summary: Non-destructively dedup and LLM-summarize an agent's memories into one long-term memory
- name: GRAPH.EXTRACT
  category: knowledge-graph
  version: "0.6.0"
  status: real
  summary: LLM-extract entities/relationships from a memory into the knowledge graph
- name: GRAPH.RELATED
  category: knowledge-graph
  version: "0.6.0"
  status: real
  summary: Find nodes related to a given node in the knowledge graph (BFS, undirected)

# --- v0.7.0: versioning + multi-tenancy (status: real) --------------------
# Multi-tenancy (--workspace-credentials, per-workspace AUTH) has no RESP
# commands of its own — see docs/getting-started/workspaces.md.

- name: MEMORY.HISTORY
  category: versioning
  version: "0.7.0"
  status: real
  summary: Fetch the full version history of a memory item, oldest first
