name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race
      # golangci-lint-action v7 is required to install a golangci-lint v2
      # binary at all (v6 hard-rejects any v2.x version string). Pinned
      # explicitly rather than "latest": v6's "latest" resolves to the
      # newest v1.x release for config-compatibility reasons, and that
      # release's binary was built with an older Go toolchain than this
      # module's own go.mod directive, which golangci-lint refuses to run
      # against. Our config is v2-schema (see .golangci.yml); bump this pin
      # deliberately when adopting a newer golangci-lint v2 release.
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deployments/docker/Dockerfile -t cache-pot:ci .
